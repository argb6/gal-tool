<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galgame 工具与网站导航</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 40px 20px; max-width: 700px; margin: 0 auto; }
h1 { font-size: 24px; margin-bottom: 24px; color: #f0f6fc; }
.search-box { position: relative; margin-bottom: 32px; }
.search-box input { width: 100%; padding: 12px 16px; font-size: 16px; border: 1px solid #30363d; border-radius: 8px; background: #161b22; color: #c9d1d9; outline: none; transition: border-color 0.2s; }
.search-box input:focus { border-color: #58a6ff; }
.stats { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px; min-width: 140px; flex: 1; }
.stat-card .num { font-size: 24px; font-weight: 600; color: #f0f6fc; }
.stat-card .label { font-size: 12px; color: #8b949e; margin-top: 4px; }
.quick-pick { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
.quick-pick h3 { font-size: 16px; margin-bottom: 12px; color: #f0f6fc; }
.quick-pick .item { margin-bottom: 8px; }
.quick-pick .item a { color: #58a6ff; text-decoration: none; }
.quick-pick .item a:hover { text-decoration: underline; }
.quick-pick .desc { font-size: 12px; color: #8b949e; margin-left: 8px; }
.cat-links { display: flex; gap: 12px; margin-bottom: 24px; }
.cat-link { flex: 1; background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px; text-align: center; text-decoration: none; color: #c9d1d9; transition: border-color 0.2s; }
.cat-link:hover { border-color: #58a6ff; }
.cat-link .icon { font-size: 20px; margin-bottom: 8px; }
.cat-link .name { font-size: 14px; font-weight: 600; }
.cat-link .count { font-size: 11px; color: #8b949e; margin-top: 4px; }
.results { margin-top: 16px; }
.result-item { padding: 14px 16px; border: 1px solid #21262d; border-radius: 8px; margin-bottom: 10px; background: #161b22; transition: border-color 0.2s; }
.result-item:hover { border-color: #58a6ff; }
.result-item a { color: #58a6ff; text-decoration: none; font-size: 16px; font-weight: 600; }
.result-item a:hover { text-decoration: underline; }
.result-item .desc { color: #8b949e; font-size: 13px; margin-top: 4px; }
.result-item .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 12px; margin-left: 8px; background: #21262d; color: #8b949e; }
.tag.simulator { background: #1f3a1f; color: #7ee787; }
.tag.website { background: #1f2a3a; color: #79c0ff; }
.tag.tool { background: #3a1f2a; color: #ffa198; }
.empty { text-align: center; color: #8b949e; padding: 40px 0; font-size: 15px; }
.loading { text-align: center; color: #484f58; padding: 60px 0; font-size: 15px; }
.status { text-align: center; color: #484f58; font-size: 12px; margin-top: -20px; margin-bottom: 20px; }
.home-section { display: block; }
.searching .home-section { display: none; }
</style>
</head>
<body>
<h1>Galgame 工具与网站导航</h1>
<div class="search-box">
  <input type="text" id="search" placeholder="搜索模拟器、网站、工具..." autofocus disabled>
</div>
<div class="status" id="status"></div>

<div class="home-section">
  <div class="cat-links" id="catLinks">
    <a href="https://github.com/argb6/gal-tool" class="cat-link" target="_blank">
      <div class="icon">🏠</div>
      <div class="name">总仓库</div>
      <div class="count">GitHub</div>
    </a>
    <a href="#" class="cat-link" id="simulatorLink">
      <div class="icon">📱</div>
      <div class="name">模拟器</div>
      <div class="count" id="simulatorCount">0</div>
    </a>
    <a href="#" class="cat-link" id="websiteLink">
      <div class="icon">🌐</div>
      <div class="name">网站</div>
      <div class="count" id="websiteCount">0</div>
    </a>
    <a href="#" class="cat-link" id="toolLink">
      <div class="icon">🛠️</div>
      <div class="name">工具</div>
      <div class="count" id="toolCount">0</div>
    </a>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="num" id="totalCount">0</div>
      <div class="label">总条目数</div>
    </div>
    <div class="stat-card">
      <div class="num" id="catCount">0</div>
      <div class="label">分类数量</div>
    </div>
    <div class="stat-card">
      <div class="num" id="updated">-</div>
      <div class="label">最近更新</div>
    </div>
  </div>

  <div class="quick-pick" id="randomPick">
    <h3>🎲 网站随机推荐</h3>
    <div class="item" id="randomItem">加载中…</div>
  </div>

  <div class="quick-pick" id="recentPick">
    <h3>📅 最近新增</h3>
    <div id="recentList">加载中…</div>
  </div>
</div>

<div class="results" id="results">
  <div class="loading">正在加载…</div>
</div>

<script>
const API = "https://api.github.com/repos/argb6/gal-tool/contents";
const GITHUB_BASE = "https://github.com/argb6/gal-tool/blob/main";
const TAG_MAP = { simulator: "模拟器", website: "网站", tool: "工具" };
const CAT_CLASS = { simulator: "simulator", website: "website", tool: "tool" };
const DIRS = [
  { dir: "simulators", cat: "simulator" },
  { dir: "websites",    cat: "website" },
  { dir: "tools",       cat: "tool" },
];

let allData = [];
let lastUpdate = "";

function parseMarkdown(text, cat, baseDir) {
  const items = [];
  const lines = text.split("\n");
  for (const line of lines) {
    const m = line.match(/^\s*-\s*\[(.+?)\]\((.+?)\)\s*(.*)/);
    if (m) {
      let name = m[1], url = m[2], desc = m[3].replace(/^[-–—]\s*/, "");
      if (!url.startsWith("http")) url = GITHUB_BASE + "/" + baseDir + url;
      items.push({ name, desc, cat, url, added: Date.now() });
    }
  }
  return items;
}

function updateStats() {
  const cats = new Set(allData.map(d => d.cat));
  document.getElementById("totalCount").textContent = allData.length;
  document.getElementById("catCount").textContent = cats.size;
  document.getElementById("updated").textContent = lastUpdate || "-";

  const counts = { simulator: 0, website: 0, tool: 0 };
  allData.forEach(d => counts[d.cat]++);
  document.getElementById("simulatorCount").textContent = counts.simulator;
  document.getElementById("websiteCount").textContent = counts.website;
  document.getElementById("toolCount").textContent = counts.tool;

  document.getElementById("simulatorLink").href = GITHUB_BASE + "/simulators/README.md";
  document.getElementById("websiteLink").href = GITHUB_BASE + "/websites/README.md";
  document.getElementById("toolLink").href = GITHUB_BASE + "/tools/README.md";
}

function updateRandomPick() {
  const websites = allData.filter(d => d.cat === "website");
  if (!websites.length) {
    document.getElementById("randomItem").textContent = "暂无网站条目";
    return;
  }
  const r = websites[Math.floor(Math.random() * websites.length)];
  document.getElementById("randomItem").innerHTML = `
    <a href="${r.url}" target="_blank">${r.name}<span class="tag ${CAT_CLASS[r.cat]}">${TAG_MAP[r.cat]}</span></a>
    <span class="desc">${r.desc}</span>
  `;
}

function updateRecentPick() {
  const recent = [...allData].sort((a, b) => b.added - a.added).slice(0, 3);
  document.getElementById("recentList").innerHTML = recent.map(r => `
    <div class="item">
      <a href="${r.url}" target="_blank">${r.name}<span class="tag ${CAT_CLASS[r.cat]}">${TAG_MAP[r.cat]}</span></a>
      <span class="desc">${r.desc}</span>
    </div>
  `).join("");
}

function search(q) {
  if (!q) {
    document.body.classList.remove("searching");
    document.getElementById("results").innerHTML = '<div class="empty">共收录 ' + allData.length + ' 个条目</div>';
    return;
  }
  document.body.classList.add("searching");
  const matched = allData.filter(d =>
    d.name.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q)
  );
  const el = document.getElementById("results");
  if (!matched.length) {
    el.innerHTML = '<div class="empty">没有找到匹配的结果</div>';
    return;
  }
  el.innerHTML = matched.map(i => `
    <div class="result-item">
      <a href="${i.url}" target="_blank">${i.name}<span class="tag ${CAT_CLASS[i.cat]}">${TAG_MAP[i.cat]}</span></a>
      <div class="desc">${i.desc}</div>
    </div>
  `).join("");
}

async function loadIndex() {
  const searchInput = document.getElementById("search");
  const statusEl = document.getElementById("status");

  const readmeFetches = DIRS.map(async ({ dir, cat }) => {
    const resp = await fetch(API + "/" + dir + "/README.md");
    if (!resp.ok) return;
    const file = await resp.json();
    const raw = await fetch(file.download_url);
    if (!raw.ok) return;
    const text = await raw.text();
    const items = parseMarkdown(text, cat, dir + "/");
    allData = allData.concat(items);
  });

  await Promise.all(readmeFetches);
  searchInput.disabled = false;
  statusEl.textContent = "已收录 " + allData.length + " 个条目（正在深度扫描更多文件…）";
  search("");
  updateStats();
  updateRandomPick();
  updateRecentPick();

  for (const { dir, cat } of DIRS) {
    try {
      const listResp = await fetch(API + "/" + dir);
      if (!listResp.ok) continue;
      const files = await listResp.json();
      const others = files.filter(f => f.name.endsWith(".md") && f.name !== "README.md");

      others.forEach(async f => {
        try {
          const rawResp = await fetch(f.download_url);
          if (!rawResp.ok) return;
          const text = await rawResp.text();
          const items = parseMarkdown(text, cat, dir + "/");
          allData = allData.concat(items);
          statusEl.textContent = "已收录 " + allData.length + " 个条目";
          updateStats();
          updateRandomPick();
          updateRecentPick();
        } catch (e) {}
      });
    } catch (e) {}
  }

  try {
    const repoResp = await fetch("https://api.github.com/repos/argb6/gal-tool");
    const repo = await repoResp.json();
    lastUpdate = new Date(repo.pushed_at).toLocaleDateString("zh-CN");
    updateStats();
  } catch (e) {}
}

document.getElementById("search").addEventListener("input", function(e) {
  search(e.target.value.trim().toLowerCase());
});

loadIndex();
</script>
</body>
</html>
