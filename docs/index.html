<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Galgame 工具与网站导航</title>
<style>
  body { background: #0d1117; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .loading { color: #8b949e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
</style>
<script>
(function(){
  var ua = navigator.userAgent || '';
  var qs = location.search; // 保留参数（?desktop / ?mobile 等）
  var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua);

  // iPadOS 13+ 伪装成 Mac，需额外判断
  if (!isMobile && /Macintosh/i.test(ua) && navigator.maxTouchPoints > 1) {
    isMobile = true;
  }

  var target = isMobile ? 'search_mobile.html' : 'search.html';
  location.replace(target + qs);
})();
</script>
</head>
<body>
<div class="loading">正在跳转…</div>
</body>
</html>
