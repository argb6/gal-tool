<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- outer ring -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#30363d" stroke-width="2"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.4"/>

  <!-- tick marks -->
  <g stroke="#8b949e" stroke-width="1.5" stroke-linecap="round">
    <!-- N -->
    <line x1="32" y1="10" x2="32" y2="13" stroke="#58a6ff" stroke-width="2"/>
    <!-- S -->
    <line x1="32" y1="51" x2="32" y2="54" stroke="#7ee787" stroke-width="2"/>
    <!-- E -->
    <line x1="51" y1="32" x2="54" y2="32" stroke="#8b949e" stroke-width="2"/>
    <!-- W -->
    <line x1="10" y1="32" x2="13" y2="32" stroke="#8b949e" stroke-width="2"/>
    <!-- NE/NW/SE/SW -->
    <line x1="16.4" y1="16.4" x2="18.2" y2="18.2"/>
    <line x1="47.6" y1="16.4" x2="45.8" y2="18.2"/>
    <line x1="16.4" y1="47.6" x2="18.2" y2="45.8"/>
    <line x1="47.6" y1="47.6" x2="45.8" y2="45.8"/>
    <!-- intermediate ticks -->
    <line x1="18.8" y1="10.5" x2="20" y2="12.7"/>
    <line x1="45.2" y1="10.5" x2="44" y2="12.7"/>
    <line x1="18.8" y1="53.5" x2="20" y2="51.3"/>
    <line x1="45.2" y1="53.5" x2="44" y2="51.3"/>
    <line x1="10.5" y1="18.8" x2="12.7" y2="20"/>
    <line x1="53.5" y1="18.8" x2="51.3" y2="20"/>
    <line x1="10.5" y1="45.2" x2="12.7" y2="44"/>
    <line x1="53.5" y1="45.2" x2="51.3" y2="44"/>
  </g>

  <!-- diamond needle (N-S) -->
  <polygon points="32,12 37,32 32,52 27,32" fill="#58a6ff"/>
  <polygon points="32,12 37,32 32,52 27,32" fill="none" stroke="#f0f6fc" stroke-width="0.5" opacity="0.4"/>

  <!-- center -->
  <circle cx="32" cy="32" r="3" fill="#0d1117" stroke="#f0f6fc" stroke-width="1"/>
</svg>