<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- outer ring -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#30363d" stroke-width="2"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.4"/>

  <!-- 16 evenly spaced tick marks (every 22.5°) -->
  <g stroke-linecap="round">
    <!-- N (0°) -->
    <line x1="32" y1="10" x2="32" y2="13" stroke="#58a6ff" stroke-width="2"/>
    <!-- NNE (22.5°) -->
    <line transform="rotate(22.5 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#7ee787" stroke-width="1.2"/>
    <!-- NE (45°) -->
    <line transform="rotate(45 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#8b949e" stroke-width="1.2"/>
    <!-- ENE (67.5°) -->
    <line transform="rotate(67.5 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#8b949e" stroke-width="1.2"/>
    <!-- E (90°) -->
    <line x1="54" y1="32" x2="51" y2="32" stroke="#8b949e" stroke-width="2"/>
    <!-- ESE (112.5°) -->
    <line transform="rotate(112.5 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#8b949e" stroke-width="1.2"/>
    <!-- SE (135°) -->
    <line transform="rotate(135 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#8b949e" stroke-width="1.2"/>
    <!-- SSE (157.5°) -->
    <line transform="rotate(157.5 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#7ee787" stroke-width="1.2"/>
    <!-- S (180°) -->
    <line x1="32" y1="54" x2="32" y2="51" stroke="#7ee787" stroke-width="2"/>
    <!-- SSW (202.5°) -->
    <line transform="rotate(202.5 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#7ee787" stroke-width="1.2"/>
    <!-- SW (225°) -->
    <line transform="rotate(225 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#8b949e" stroke-width="1.2"/>
    <!-- WSW (247.5°) -->
    <line transform="rotate(247.5 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#8b949e" stroke-width="1.2"/>
    <!-- W (270°) -->
    <line x1="10" y1="32" x2="13" y2="32" stroke="#8b949e" stroke-width="2"/>
    <!-- WNW (292.5°) -->
    <line transform="rotate(292.5 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#8b949e" stroke-width="1.2"/>
    <!-- NW (315°) -->
    <line transform="rotate(315 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#8b949e" stroke-width="1.2"/>
    <!-- NNW (337.5°) -->
    <line transform="rotate(337.5 32 32)" x1="32" y1="10" x2="32" y2="12.5" stroke="#7ee787" stroke-width="1.2"/>
  </g>

  <!-- diamond needle (N-S) -->
  <polygon points="32,12 37,32 32,52 27,32" fill="#58a6ff"/>
  <polygon points="32,12 37,32 32,52 27,32" fill="none" stroke="#f0f6fc" stroke-width="0.5" opacity="0.4"/>

  <!-- center -->
  <circle cx="32" cy="32" r="3" fill="#0d1117" stroke="#f0f6fc" stroke-width="1"/>
</svg>