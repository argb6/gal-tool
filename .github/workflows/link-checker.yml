name: 网站链接检查

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install httpx

      - name: 运行链接检查
        run: python scripts/check_links.py

      - name: 提交检查报告
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/link-status.json
          git diff --staged --quiet || git commit -m "自动更新链接检查报告"
          git push

      - name: 创建 Issue
        if: env.HAS_DEAD == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('issue_body.txt', 'utf8');
            const deadNames = fs.readFileSync('dead_names.txt', 'utf8');
            const title = '链接失效通知：' + deadNames;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['link-check']
            });
