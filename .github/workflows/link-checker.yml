name: 网站链接检查

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install httpx

      - name: 运行链接检查
        run: python scripts/check_links.py

      - name: 提交检查报告
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/link-status.json
          git diff --staged --quiet || git commit -m "自动更新链接检查报告"
          git push

      - name: 创建 Issue
        if: env.HAS_DEAD == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('issue_body.txt', 'utf8');
            const deadNames = fs.readFileSync('dead_names.txt', 'utf8');
            const title = '链接失效通知：' + deadNames;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['link-check']
            });

      - name: 推送每日报告
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const status = '${{ job.status }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'});

            let body = `## 每日链接检查报告

**时间**：${now}
**状态**：${status === 'success' ? '✅ 成功' : '❌ 失败'}`;

            if (status === 'success') {
              const report = JSON.parse(fs.readFileSync('docs/link-status.json', 'utf8'));
              body += `

| 指标 | 数量 |
|------|------|
| 总计 | ${report.total} |
| 正常 | ${report.alive} |
| 失效 | ${report.dead} |
| 异常 | ${report.error} |

[查看详情](${runUrl})`;

              if (report.dead > 0 || report.error > 0) {
                body += '

⚠️ 发现失效链接，已自动创建 Issue。';
              } else {
                body += '

✅ 所有链接正常。';
              }
            } else {
              body += `

[查看运行日志](${runUrl})`;
            }

            // 在固定 Issue #1 下评论每日报告
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              sort: 'created',
              direction: 'desc',
              per_page: 1
            });

            // 如果是今天的报告就更新，否则新建评论
            const today = new Date().toLocaleDateString('zh-CN', {timeZone: 'Asia/Shanghai'});
            if (comments.length > 0 && comments[0].body.includes(today)) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comments[0].id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 1,
                body: body
              });
            }
