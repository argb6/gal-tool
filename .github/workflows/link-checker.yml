name: 网站链接检查

on:
  schedule:
    - cron: '0 8 * * 1'  # 每周一早上 8:00 UTC
  workflow_dispatch:      # 手动触发

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install httpx

      - name: 运行链接检查
        run: python scripts/check_links.py
